services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5000
      DATA_DIRECTORY: /app/data
    ports:
      - "5000:5000"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:5000/api/health >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
